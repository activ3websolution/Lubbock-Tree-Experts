<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lubbock Tree Experts | Contact</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo">Lubbock Tree Experts</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="portfolio.html">Portfolio</a></li>
                    <li><a href="get-started.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="container content-section">
            <h2 class="section-title">Get a Free Estimate</h2>
            <p style="text-align: center; max-width: 800px; margin: 0 auto 40px auto;">Fill out the form below and we'll get back to you shortly. For immediate assistance, please call us.</p>
            <form class="contact-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                 <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone" required>
                <label for="message">How can we help?</label>
                <textarea id="message" name="message" rows="4" required></textarea>
                <button type="submit" class="btn">Get My Free Estimate</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Lubbock Tree Experts. All Rights Reserved.</p>
        </div>
    </footer>
</body>
</html>
